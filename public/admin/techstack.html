<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Tech Stack - Portfolio Admin</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Custom Tailwind Configuration -->
    <script src="js/tailwind-config.js"></script>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Local Custom Stylesheet -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Firebase SDK Compat Services -->
    <script defer src="/__/firebase/12.14.0/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/12.14.0/firebase-firestore-compat.js"></script>
    <script defer src="/__/firebase/init.js?useEmulator=true"></script>

    <!-- Application Script -->
    <script defer src="js/techstack.js"></script>
  </head>
  <body class="bg-background text-on-background font-body-lg text-body-lg min-h-screen flex">
    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Modal Form Skill -->
    <div id="skillModal" class="modal-overlay">
      <div class="modal-content modal-content-narrow">
        <div class="flex items-center justify-between mb-6">
          <h2 class="font-h2 text-h2 text-on-surface" id="modalTitleSkill">Add New Skill</h2>
          <button class="text-slate-400 hover:text-slate-700 flex items-center justify-center cursor-pointer" onclick="closeSkillModal()">
            <!-- Icon X-Mark -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <form id="skillForm" class="space-y-4">
          <input type="hidden" id="editSkillId" />
          <div>
            <label class="font-label-sm text-label-sm text-on-surface-variant" for="skillName">Skill Name</label>
            <input
              class="w-full border border-outline-variant rounded-lg px-4 py-2.5 bg-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none"
              id="skillName"
              placeholder="e.g. React"
              required
            />
          </div>
          <div>
            <label class="font-label-sm text-label-sm text-on-surface-variant" for="skillCategory">Category</label>
            <select
              class="w-full border border-outline-variant rounded-lg px-4 py-2.5 bg-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none"
              id="skillCategory"
            >
              <option value="Frontend">Frontend</option>
              <option value="Backend">Backend</option>
              <option value="Tools">Tools</option>
            </select>
          </div>
        </form>
        <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-outline-variant">
          <button
            class="px-5 py-2 rounded-lg border border-outline text-secondary hover:bg-surface-variant transition-colors cursor-pointer"
            onclick="closeSkillModal()"
          >
            Cancel
          </button>
          <button
            class="px-5 py-2 rounded-lg bg-primary text-on-primary hover:bg-primary/90 transition-colors flex items-center gap-2 cursor-pointer"
            onclick="saveSkill()"
            id="skillSubmitBtn"
          >
            Add Skill
          </button>
        </div>
      </div>
    </div>

    <!-- Navigation Sidebar -->
    <nav class="fixed left-0 top-0 h-full w-[280px] border-r border-slate-800 shadow-xl bg-slate-900 flex flex-col overflow-y-auto z-50">
      <div class="text-white text-xl font-bold tracking-tight px-6 py-8 flex flex-col">
        Portfolio Manager
        <span class="text-sm font-normal text-slate-400 mt-1">Sophisticated Operator</span>
      </div>
      <div class="px-6 mb-6">
        <a
          href="project.html"
          class="block w-full py-2 bg-indigo-500/10 text-indigo-400 rounded-lg font-inter text-sm font-medium border border-indigo-500/20 hover:bg-indigo-500/20 transition-colors text-center"
        >
          New Project
        </a>
      </div>
      <ul class="flex-1 font-inter text-sm font-medium tracking-wide flex flex-col gap-1">
        <li>
          <a
            class="flex items-center gap-3 px-6 py-3 text-slate-400 hover:text-white hover:bg-slate-800/30 transition-all duration-200"
            href="dashboard.html"
          >
            <!-- Icon Dashboard -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25a2.25 2.25 0 0 1 13.5 18v-2.25Z" />
            </svg>
            Dashboard
          </a>
        </li>
        <li>
          <a
            class="flex items-center gap-3 px-6 py-3 text-slate-400 hover:text-white hover:bg-slate-800/30 transition-all duration-200"
            href="contact.html"
          >
            <!-- Icon Mail -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
            </svg>
            Contact
          </a>
        </li>
        <li>
          <a
            class="flex items-center gap-3 px-6 py-3 text-slate-400 hover:text-white hover:bg-slate-800/30 transition-all duration-200"
            href="project.html"
          >
            <!-- Icon Projects -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 13.5h3.86a2.25 2.25 0 0 1 2.008 1.24l.885 1.77a2.25 2.25 0 0 0 2.007 1.24h1.98a2.25 2.25 0 0 0 2.007-1.24l.885-1.77a2.25 2.25 0 0 1 2.007-1.24h3.86m-18 0h18a2.25 2.25 0 0 1 2.25 2.25v4.5A2.25 2.25 0 0 1 18 21H6a2.25 2.25 0 0 1-2.25-2.25v-4.5a2.25 2.25 0 0 1 2.25-2.25ZM6 7.5h12a2.25 2.25 0 0 1 20.25 9.75v1.5H3.75v-1.5A2.25 2.25 0 0 1 6 7.5Z" />
            </svg>
            Projects
          </a>
        </li>
        <li>
          <a
            class="flex items-center gap-3 px-6 py-3 border-l-4 border-indigo-500 bg-slate-800/50 text-white transition-all duration-200"
            href="techstack.html"
          >
            <!-- Icon Code -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5" />
            </svg>
            Tech Stack
          </a>
        </li>
      </ul>
      <div class="mt-auto border-t border-slate-800">
        <ul class="font-inter text-sm font-medium tracking-wide py-4">
          <li>
            <a
              class="flex items-center gap-3 px-6 py-3 text-slate-400 hover:text-white hover:bg-slate-800/30 transition-all duration-200"
              href="/"
            >
              <!-- Icon Globe/Public -->
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9s2.015-9 4.5-9m0 0a9.003 9.003 0 0 1 8.716 6.747M12 3a9.003 9.003 0 0 0-8.716 6.747M21 12h-3M3 12h3m9 0H9" />
              </svg>
              View Site
            </a>
          </li>
          <li>
            <a
              class="flex items-center gap-3 px-6 py-3 text-slate-400 hover:text-red-400 hover:bg-slate-800/30 transition-all duration-200 cursor-pointer"
              onclick="logout()"
            >
              <!-- Icon Logout -->
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
              </svg>
              Logout
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Main Workspace -->
    <div class="flex-1 ml-[280px] flex flex-col min-h-screen">
      <!-- Header -->
      <header class="fixed top-0 right-0 left-[280px] z-30 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 shadow-sm flex justify-between items-center h-16 px-8 font-inter text-base font-medium">
        <div class="flex-1 flex items-center">
          <div class="relative w-64 focus-within:ring-2 focus-within:ring-indigo-500 rounded-lg">
            <!-- Icon Search -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
              <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.602 10.602Z" />
            </svg>
            <input
              class="w-full pl-10 pr-4 py-2 bg-slate-50 dark:bg-slate-800 border-none rounded-lg text-sm focus:outline-none focus:ring-0 text-slate-500 dark:text-slate-400"
              placeholder="Search skills..."
              type="text"
              id="searchSkill"
              oninput="filterSkills()"
            />
          </div>
        </div>
        <div class="flex items-center gap-4 text-indigo-600 dark:text-indigo-400">
          <button class="p-2 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg transition-colors flex items-center justify-center cursor-pointer">
            <!-- Icon Bell -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5 text-slate-500">
              <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
            </svg>
          </button>
          <div class="w-8 h-8 rounded-full overflow-hidden border border-slate-200 ml-2">
            <img
              alt="User"
              class="w-full h-full object-cover"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuCyCMEqDWtLnvIOlcjnFi61cPZLf5AhQnbo2OfRlIaLwkFoZtxmzrHn1z8BC9ANWpWK05zeh8Lh0Tm__UluKgGiC_axtUgSRnG-JNPoVfL_zg4WFv5k9uTwvs9rktgMbez3T0Os2DygCkVO1h4PL7rFylPa-yJMKWGVZkZHETKh9Byw7YeoMPHE9hAWDDvh2h3CLFXuJHhRz6KWtE49TKtJLcPDNMDQGnMyOJ9IbmpSfHePgsToilC3Z201WdEQF0P8CqgMWctrPQ"
            />
          </div>
        </div>
      </header>

      <!-- Main Workspace Section -->
      <main class="flex-1 mt-16 p-container-padding bg-background">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
          <div>
            <h1 class="font-h1 text-h1 text-on-background">Tech Stack</h1>
            <p class="font-body-md text-body-md text-on-surface-variant mt-1">
              Manage and categorize your technical proficiencies.
            </p>
          </div>
          <button
            class="bg-primary text-on-primary px-5 py-2.5 rounded-lg flex items-center gap-2 hover:bg-primary/90 transition-colors shadow-sm font-label-sm text-label-sm cursor-pointer"
            onclick="openSkillModal()"
          >
            <!-- Icon Plus -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
            Add New Skill
          </button>
        </div>

        <!-- Filter Tab -->
        <div class="bg-surface border border-outline-variant rounded-xl p-4 mb-8 flex flex-wrap gap-4 items-center justify-between shadow-[0_2px_8px_-2px_rgba(0,0,0,.05)]">
          <div class="flex gap-2">
            <button
              class="px-4 py-2 rounded-lg bg-primary text-on-primary font-label-sm text-label-sm cursor-pointer"
              onclick="filterByCategory('All')"
              id="filterAll"
            >
              All
            </button>
            <button
              class="px-4 py-2 rounded-lg bg-surface border border-outline-variant text-on-surface font-label-sm text-label-sm hover:bg-surface-container transition-colors cursor-pointer"
              onclick="filterByCategory('Frontend')"
              id="filterFrontend"
            >
              Frontend
            </button>
            <button
              class="px-4 py-2 rounded-lg bg-surface border border-outline-variant text-on-surface font-label-sm text-label-sm hover:bg-surface-container transition-colors cursor-pointer"
              onclick="filterByCategory('Backend')"
              id="filterBackend"
            >
              Backend
            </button>
            <button
              class="px-4 py-2 rounded-lg bg-surface border border-outline-variant text-on-surface font-label-sm text-label-sm hover:bg-surface-container transition-colors cursor-pointer"
              onclick="filterByCategory('Tools')"
              id="filterTools"
            >
              Tools
            </button>
          </div>
        </div>

        <!-- Dynamic Category Grid -->
        <div id="categoryGrid" class="grid grid-cols-1 lg:grid-cols-3 gap-gutter">
          <div class="text-center py-12 col-span-full text-on-surface-variant flex flex-col items-center justify-center gap-3">
            <!-- Loading Spinner -->
            <svg class="animate-spin h-8 w-8 text-primary" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Loading skills...</span>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
